apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: node-template-env-secrets
  namespace: cogni-production
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
    app.kubernetes.io/component: node-template
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: node-template-env-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: production/node-template
