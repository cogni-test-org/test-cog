name: PR Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and image
    runs-on: ubuntu-latest
    steps:
      - name: Resolve source metadata
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            source_sha="$PR_HEAD_SHA"
            if [ "$PR_HEAD_REPO" = "$REPOSITORY" ]; then
              should_push=true
            else
              should_push=false
            fi
          else
            source_sha="$PUSH_SHA"
            should_push=true
          fi

          owner_lc="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(printf '%s' "${REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"

          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${source_sha}" >> "$GITHUB_OUTPUT"
          echo "should_push=$should_push" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.source_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck package closure
        run: pnpm check

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.source.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: ${{ steps.source.outputs.should_push == 'true' }}
          tags: ${{ steps.source.outputs.image_name }}:${{ steps.source.outputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.source_sha }}
          build-args: |
            BUILD_SHA=${{ steps.source.outputs.source_sha }}
          cache-from: type=gha,scope=node-template-app
          cache-to: type=gha,mode=max,scope=node-template-app
