name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  NODE_VERSION: "22"
  NODE_ENV: test
  LITELLM_MASTER_KEY: build-key
  AUTH_SECRET: tNf5lFM9yMhdgwS5yeQB8Y2kmigblBqobkvI2XN2brg=
  SCHEDULER_API_TOKEN: test-scheduler-api-token-for-ci-min32chars
  BILLING_INGEST_TOKEN: test-billing-ingest-token-for-ci-min32ch
  INTERNAL_OPS_TOKEN: test-internal-ops-token-for-ci-min32
  DISCORD_BOT_TOKEN: test-discord-bot-token-for-ci
  POSTHOG_API_KEY: phc_test_key_for_ci
  POSTHOG_HOST: http://localhost:18000

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm packages:build

      - name: Type check
        run: pnpm typecheck

      - name: Workflow contract check
        run: pnpm check:workflow

  unit:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm packages:build

      - name: Unit + contract coverage tests
        run: pnpm test:ci

  component:
    # Skip on merge_group: kept off the required-status-checks path so the
    # queue doesn't re-run testcontainers on every rebased candidate.
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest # GitHub-hosted runners provide Docker for testcontainers
    needs: static
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm packages:build

      # The repo/ripgrep-adapter component test shells out to `rg`; its adapter
      # ships in the scaffold, so the binary must be present (mirrors operator).
      - name: Install ripgrep
        uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2
        with:
          tool: ripgrep

      - name: Verify ripgrep
        run: rg --version

      - name: Component tests (testcontainers)
        run: pnpm test:component
