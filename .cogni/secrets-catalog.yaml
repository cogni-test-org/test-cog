# Per-node secrets catalog — node-domain (single-node-scope).
#
# Declare the SHAPE of each A2 secret this node's app consumes; NEVER the value.
# `service:` auto-resolves to this node's slug, so each key lands at
# OpenBao `cogni/<env>/<slug>/<KEY>` and fans out ONLY to this node's pod.
#
# The VALUE is written separately — see docs/guides/add-secret.md §3:
#   - self-serve: POST /api/v1/nodes/<id>/secrets  (node-owner, OpenFGA-gated, API key only)
#   - ops:        pnpm secrets:set <env> <slug> <KEY>
#
# This file ships empty. Add entries as your node needs them, e.g.:
#
# secrets:
#   - name: MY_VENDOR_API_KEY
#     tier: A2
#     appliesTo: web
#     shared: false
#     source: human
#     required: true
#     category: "Vendor Name"
#     description: One line describing what consumes this key.
#     steps:
#       - "Create the key in the vendor dashboard."

secrets: []
